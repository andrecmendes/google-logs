<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
<meta name="color-scheme" content="dark"/>
<title>logs</title>
<style>
  :root{
    --bg:#0b0d10; --panel:#13171c; --panel2:#171c22; --line:#232a32;
    --txt:#e6edf3; --dim:#8b98a5; --accent:#4da3ff; --ok:#3fb950; --warn:#d29922; --err:#f85149;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    -webkit-text-size-adjust:100%}
  body{padding:env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 24px)}
  header{display:flex;align-items:center;gap:8px;padding:14px 2px 12px;position:sticky;top:0;
    background:linear-gradient(var(--bg),var(--bg) 70%,transparent);z-index:5}
  header .logo{font-weight:700;letter-spacing:.5px}
  header .logo b{color:var(--accent)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
  .dot.on{background:var(--ok)} .dot.off{background:var(--err)}
  .spacer{flex:1}
  .upd{color:var(--dim);font-size:12px}
  .lock{color:var(--dim);font-size:12px;cursor:pointer;border:1px solid var(--line);border-radius:8px;padding:3px 8px}
  main{margin-top:4px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin:10px 0}
  .badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .badge{font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid var(--line);color:var(--dim);background:var(--panel2)}
  .badge.src-screenshot{color:#000;background:var(--warn);border-color:var(--warn)}
  .badge.src-html{color:#000;background:var(--accent);border-color:var(--accent)}
  .answer{font-size:clamp(22px,7vw,34px);line-height:1.25;font-weight:700;word-break:break-word;cursor:pointer}
  .answer:active{opacity:.6}
  .q{color:var(--dim);font-size:13px;margin:12px 0 0;line-height:1.45;white-space:pre-wrap;word-break:break-word}
  .conf{margin-top:12px}
  .conf .bar{height:6px;border-radius:999px;background:var(--panel2);overflow:hidden;border:1px solid var(--line)}
  .conf .bar > i{display:block;height:100%;background:var(--ok)}
  .conf .lab{font-size:11px;color:var(--dim);margin-top:5px}
  details{margin-top:12px;border-top:1px dashed var(--line);padding-top:10px}
  details summary{cursor:pointer;color:var(--accent);font-size:13px;list-style:none}
  details summary::-webkit-details-marker{display:none}
  .reason{white-space:pre-wrap;word-break:break-word;font-size:13px;color:var(--txt);margin-top:8px;line-height:1.5}
  .status{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700}
  .status.loading{color:var(--accent)} .status.error{color:var(--err)} .status.usage{color:var(--warn)}
  .status.mode_html{color:var(--accent)} .status.mode_screen{color:var(--warn)}
  .pulse{width:12px;height:12px;border-radius:50%;background:currentColor;animation:p 1s ease-in-out infinite}
  @keyframes p{0%,100%{opacity:.25}50%{opacity:1}}
  h2.sec{color:var(--dim);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin:22px 2px 6px}
  .hist .card{padding:12px 14px;margin:8px 0}
  .hist .answer{font-size:16px;font-weight:600}
  .hist .meta{color:var(--dim);font-size:11px;margin-top:6px;display:flex;gap:10px;flex-wrap:wrap}
  .empty{color:var(--dim);text-align:center;padding:40px 0;font-size:14px}
  .copied{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--ok);color:#000;
    padding:8px 14px;border-radius:999px;font-size:13px;font-weight:700;opacity:0;transition:opacity .2s;pointer-events:none}
  .copied.show{opacity:1}
  /* PIN gate */
  #gate{position:fixed;inset:0;background:var(--bg);z-index:50;display:none;
    align-items:center;justify-content:center;padding:24px}
  #gate.show{display:flex}
  .gatebox{width:100%;max-width:300px;text-align:center}
  .gatebox .glogo{font-weight:700;letter-spacing:.5px;margin-bottom:18px}
  .gatebox .glogo b{color:var(--accent)}
  .gatebox input{width:100%;font-family:inherit;font-size:22px;text-align:center;letter-spacing:6px;
    padding:14px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--txt);outline:none}
  .gatebox input:focus{border-color:var(--accent)}
  .gatebox button{width:100%;margin-top:12px;font-family:inherit;font-size:16px;font-weight:700;
    padding:13px;border-radius:12px;border:0;background:var(--accent);color:#001022;cursor:pointer}
  .gatebox .gerr{color:var(--err);font-size:13px;min-height:18px;margin-top:12px}
  .gatebox .ghint{color:var(--dim);font-size:12px;margin-top:14px;line-height:1.5}
</style>
</head>
<body>
  <header>
    <span class="logo">google<b>·</b>logs</span>
    <span id="dot" class="dot"></span>
    <span class="spacer"></span>
    <span id="upd" class="upd">—</span>
    <span id="lockBtn" class="lock" title="Lock">🔒</span>
  </header>
  <main id="current"></main>
  <section class="hist"><h2 class="sec" id="histTitle" hidden>Recent</h2><div id="history"></div></section>
  <div id="toast" class="copied">copied</div>

  <div id="gate">
    <div class="gatebox">
      <div class="glogo">google<b>·</b>logs</div>
      <input id="pin" type="password" inputmode="numeric" autocomplete="off" placeholder="PIN" aria-label="PIN"/>
      <button id="unlock">Unlock</button>
      <div id="gerr" class="gerr"></div>
      <div class="ghint">Encrypted. Enter the PIN to view.</div>
    </div>
  </div>

<script>
const POLL_MS = 2500;
const FILE = "log.json";
const PIN_KEY = "gl_pin";
const $ = (id) => document.getElementById(id);
let lastRaw = "";        // last RAW file text we rendered (encrypted or plain)
let lastEntries = null;  // last decrypted entries (for time refresh)
let keyCache = {};       // "salt|iter|pin" -> CryptoKey (avoids re-deriving each poll)

/* ---------- crypto (mirrors src/backend/crypto_util.py) ---------- */
const b = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function deriveKey(pin, saltB64, iter){
  const ck = saltB64 + "|" + iter + "|" + pin;
  if (keyCache[ck]) return keyCache[ck];
  const baseKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(pin), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b(saltB64), iterations:iter, hash:"SHA-256"},
    baseKey, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  keyCache[ck] = key;
  return key;
}
async function decryptPayload(p, pin){
  const key = await deriveKey(pin, p.salt, p.iter || 200000);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b(p.iv)}, key, b(p.ct));
  return new TextDecoder().decode(pt);
}

/* ---------- rendering ---------- */
function rel(ts){
  const t = Date.parse(ts); if(isNaN(t)) return "";
  const s = Math.max(0,(Date.now()-t)/1000);
  if(s<5) return "just now";
  if(s<60) return Math.floor(s)+"s ago";
  if(s<3600) return Math.floor(s/60)+"m ago";
  if(s<86400) return Math.floor(s/3600)+"h ago";
  return new Date(t).toLocaleString();
}
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function toast(){const t=$("toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),900);}
function copy(text){ if(navigator.clipboard){navigator.clipboard.writeText(text).then(toast,()=>{});} }

function answerCard(e, big){
  const div = document.createElement("div");
  div.className = "card";
  const conf = Number.isFinite(e.confidence) ? e.confidence : null;
  const src = e.source === "screenshot" ? "screenshot" : "html";
  div.innerHTML = `
    <div class="badges">
      <span class="badge src-${src}">${src==="screenshot"?"📷 screenshot":"⌨ html"}</span>
      ${e.qtype?`<span class="badge">${esc(e.qtype)}</span>`:""}
      <span class="badge">${rel(e.ts)}</span>
    </div>
    <div class="answer">${esc(e.answer)||"(empty)"}</div>
    ${big && e.question?`<div class="q">Q: ${esc(e.question)}</div>`:""}
    ${big && conf!==null?`<div class="conf"><div class="bar"><i style="width:${Math.max(0,Math.min(100,conf))}%"></i></div><div class="lab">confidence ${conf}%</div></div>`:""}
    ${big && e.reasoning?`<details><summary>reasoning</summary><div class="reason">${esc(e.reasoning)}</div></details>`:""}
  `;
  div.querySelector(".answer").addEventListener("click",()=>copy(e.answer||""));
  return div;
}
function statusCard(e){
  const div=document.createElement("div");
  div.className="card";
  const cls = e.status || "loading";
  div.innerHTML=`<div class="status ${cls}"><span class="pulse"></span><span>${esc(e.message||e.status)}</span></div>
    <div class="badges" style="margin-top:10px"><span class="badge">${rel(e.ts)}</span></div>`;
  return div;
}
function render(entries){
  const cur = $("current"); cur.innerHTML="";
  if(!entries.length){ cur.innerHTML=`<div class="empty">waiting for the first solve…</div>`; $("history").innerHTML=""; $("histTitle").hidden=true; return; }
  const top = entries[0];
  cur.appendChild(top.kind==="status"?statusCard(top):answerCard(top,true));
  const answers = entries.filter(e=>e.kind==="answer" && e!==top);
  const hist=$("history"); hist.innerHTML="";
  $("histTitle").hidden = answers.length===0;
  answers.slice(0,40).forEach(e=>{
    const c=answerCard(e,false);
    const m=document.createElement("div"); m.className="meta";
    m.innerHTML=`<span>${rel(e.ts)}</span>${e.qtype?`<span>${esc(e.qtype)}</span>`:""}<span>${e.source==="screenshot"?"📷":"⌨"}</span>`;
    c.appendChild(m); hist.appendChild(c);
  });
}

/* ---------- gate ---------- */
function showGate(msg){ $("gerr").textContent=msg||""; $("gate").classList.add("show"); setTimeout(()=>$("pin").focus(),50); }
function hideGate(){ $("gate").classList.remove("show"); }
function lock(){ sessionStorage.removeItem(PIN_KEY); lastRaw=""; lastEntries=null; keyCache={}; $("pin").value=""; showGate(); }

async function unlock(){
  const pin = $("pin").value.trim();
  if(!pin){ return; }
  $("gerr").textContent = "checking…";
  try{
    const r = await fetch(FILE+"?t="+Date.now(), {cache:"no-store"});
    const parsed = JSON.parse(await r.text());
    if(parsed && parsed.ct){ await decryptPayload(parsed, pin); }  // throws on wrong PIN
    sessionStorage.setItem(PIN_KEY, pin);
    $("gerr").textContent = ""; lastRaw=""; hideGate(); tick();
  }catch(e){ $("gerr").textContent = "Wrong PIN."; }
}

/* ---------- polling ---------- */
function setOnline(on){ $("dot").className = "dot " + (on?"on":"off"); if(on) $("upd").textContent = new Date().toLocaleTimeString(); }

async function tick(){
  try{
    const r = await fetch(FILE+"?t="+Date.now(), {cache:"no-store"});
    if(!r.ok) throw new Error(r.status);
    const raw = await r.text();
    setOnline(true);
    if(raw===lastRaw) return;
    let parsed; try{parsed=JSON.parse(raw)}catch(_){parsed=null}
    let entries;
    if(Array.isArray(parsed)){
      entries = parsed;                                  // plaintext fallback
    } else if(parsed && parsed.ct){
      const pin = sessionStorage.getItem(PIN_KEY);
      if(!pin){ showGate(); return; }
      try{ entries = JSON.parse(await decryptPayload(parsed, pin)); }
      catch(e){ sessionStorage.removeItem(PIN_KEY); keyCache={}; showGate("Wrong PIN — try again."); return; }
    } else {
      entries = [];
    }
    lastRaw = raw; lastEntries = entries; hideGate();
    render(entries);
  }catch(e){ setOnline(false); }
}

$("unlock").addEventListener("click", unlock);
$("pin").addEventListener("keydown", e=>{ if(e.key==="Enter") unlock(); });
$("lockBtn").addEventListener("click", lock);

if(!sessionStorage.getItem(PIN_KEY)) showGate();
tick();
setInterval(tick, POLL_MS);
setInterval(()=>{ if(lastEntries) render(lastEntries); }, 15000);  // refresh "x ago"
document.addEventListener("visibilitychange",()=>{ if(!document.hidden) tick(); });
</script>
</body>
</html>
